version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install deps including optional Linux-native binaries (lightningcss, sharp)
        - npm ci --cache .npm --prefer-offline --include=optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
