version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Use npm install (not npm ci) so platform-native binaries
        # for linux-x64 are resolved fresh, regardless of which OS
        # generated the lock file (lightningcss, @tailwindcss/oxide, sharp).
        - npm install --include=optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*