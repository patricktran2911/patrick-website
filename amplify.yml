version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Wipe any cached node_modules — may contain Windows-platform native
        # binaries (@tailwindcss/oxide, lightningcss, sharp) that break on Linux.
        # Install fresh so CodeBuild resolves the correct linux-x64 binaries.
        - rm -rf node_modules
        - npm install --include=optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      # Only cache Next.js compiler output — node_modules is platform-specific
      # and must NOT be cached across Windows dev → Linux build environments.
      - .next/cache/**/*